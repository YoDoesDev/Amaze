name: deploy-sftp-heavencloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout-repo
        uses: actions/checkout@v6
        
      - name: prepare-deploy
        run: |
          rm -rf deploy
          mkdir deploy
          rsync -av \
          --exclude='.git' \
          --exclude='.github' \
          --exclude='node_modules' \
          --exclude='.env' \
          --exclude='*.sqlite' \
          ./ deploy/
          
      - name: deploy-sftp
        uses: pressidium/lftp-mirror-action@v1
        with:
          host: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          user: ${{ secrets.SFTP_USER }}
          pass: ${{ secrets.SFTP_PASS }}
          localDir: "deploy"
          remoteDir: "."
          # The key is using "." for both to stay in the current directory
          options: "--verbose --only-newer"
